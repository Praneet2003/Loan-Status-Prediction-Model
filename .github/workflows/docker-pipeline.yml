name: Loan Approval CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Frontend Service
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/frontend-service:latest

      - name: Build & Push Prediction Service
        uses: docker/build-push-action@v5
        with:
          context: ./prediction-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/prediction-service:latest

      - name: Build & Push Logging Service
        uses: docker/build-push-action@v5
        with:
          context: ./logging-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/logging-service:latest

      - name: Verify Docker Compose Config
        run: docker compose config

      - name: Start Services
        run: docker compose up -d

      - name: Wait for Services to be Healthy
        run: sleep 15

      - name: Check Running Containers
        run: docker compose ps

      - name: Show Logs on Failure
        if: failure()
        run: docker compose logs

      - name: Tear Down Services
        if: always()
        run: docker compose down