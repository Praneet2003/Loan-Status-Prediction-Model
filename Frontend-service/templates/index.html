<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Approval Prediction</title>

<style>
    body {
        font-family: 'Poppins', sans-serif;
        margin: 0;
        padding-top: 70px;
        padding-bottom: 40px;
        background-image: url("https://images.unsplash.com/photo-1521791136064-7986c2920216?auto=format&fit=crop&w=1600&q=80");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        overflow-y: auto;
    }

    .container {
        background: rgba(0, 0, 0, 0.65);
        padding: 40px;
        border-radius: 15px;
        width: 520px;
        margin: auto;

        color: white;
        text-align: left;

        box-shadow: 0 0 30px rgba(0, 195, 255, 0.9), 0 0 50px rgba(0, 110, 255, 0.5);
        animation: glow 3s infinite alternate;
    }

    @keyframes glow {
        from { box-shadow: 0 0 20px rgba(0,186,255,0.6); }
        to   { box-shadow: 0 0 45px rgba(0,91,255,1); }
    }

    h2 {
        text-align: center;
        font-size: 32px;
        margin-bottom: 25px;
        color: #00c6ff;
        font-weight: 800;
    }

    label {
        display: block;
        margin-top: 12px;
        font-weight: 600;
    }

    input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        margin-top: 5px;
        font-size: 15px;
    }

    input:focus {
        outline: none;
        box-shadow: 0 0 10px #00c6ff;
    }

    button {
        margin-top: 25px;
        width: 100%;
        background: #007bff;
        color: white;
        font-size: 18px;
        padding: 15px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        transition: 0.3s;
        font-weight: 700;
    }

    button:hover {
        background: #0056b3;
        transform: scale(1.03);
    }

    #resultBox {
        margin-top: 20px;
        font-size: 22px;
        font-weight: 700;
        text-align: center;
        padding: 12px;
        border-radius: 10px;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Check Your Loan Status</h2>

    <form action="/predict" method="POST">

        <label>Age</label>
        <input type="number" name="age" value="{{ form_values.age if form_values }}" required>

        <label>Years Employed</label>
        <input type="number" name="years_employed" value="{{ form_values.years_employed if form_values }}" required>

        <label>Annual Income ($)</label>
        <input type="number" name="annual_income" value="{{ form_values.annual_income if form_values }}" required>

        <label>Credit Score</label>
        <input type="number" name="credit_score" value="{{ form_values.credit_score if form_values }}" required>

        <label>Credit History Years</label>
        <input type="number" name="credit_history_years" value="{{ form_values.credit_history_years if form_values }}" required>

        <label>Current Debt ($)</label>
        <input type="number" name="current_debt" value="{{ form_values.current_debt if form_values }}" required>

        <label>Defaults on File</label>
        <input type="number" name="defaults_on_file" value="{{ form_values.defaults_on_file if form_values }}" required>

        <label>Delinquencies Last 2 Years</label>
        <input type="number" name="delinquencies_last_2yrs" value="{{ form_values.delinquencies_last_2yrs if form_values }}" required>

        <label>Derogatory Marks</label>
        <input type="number" name="derogatory_marks" value="{{ form_values.derogatory_marks if form_values }}" required>

        <label>Loan Amount ($)</label>
        <input type="number" name="loan_amount" value="{{ form_values.loan_amount if form_values }}" required>

        <label>Interest Rate (%)</label>
        <input type="number" step="0.01" name="interest_rate" value="{{ form_values.interest_rate if form_values }}" required>

        <label>Debt to Income Ratio</label>
        <input type="number" step="0.01" name="debt_to_income_ratio" value="{{ form_values.debt_to_income_ratio if form_values }}" required>

        <button type="submit">Predict Loan Status</button>
    </form>

    {% if prediction_text %}
    <div id="resultBox" style="color: {% if 'Congratulations' in prediction_text %}#00ff7f{% else %}#ff4747{% endif %};">
        {{ prediction_text }}
    </div>
    {% endif %}
</div>

</body>
</html>
